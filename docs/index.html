<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 Zen Tarot · 运营看板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0f0e17;
    --surface: #1a1830;
    --surface2: #231f3a;
    --border: #2e2a4a;
    --purple: #8b5cf6;
    --purple-light: #a78bfa;
    --pink: #ec4899;
    --cyan: #06b6d4;
    --gold: #f59e0b;
    --text: #e8e4f0;
    --muted: #7c7a8e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }

  /* 背景星点 */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(139,92,246,.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(236,72,153,.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, rgba(6,182,212,.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; }

  /* 顶部标题 */
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
  }
  .title { font-size: 22px; font-weight: 700; letter-spacing: .05em; }
  .title span { background: linear-gradient(135deg, var(--purple-light), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .updated { font-size: 13px; color: var(--muted); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* 核心指标卡 */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 18px;
    position: relative; overflow: hidden;
    transition: transform .2s, border-color .2s;
  }
  .metric-card:hover { transform: translateY(-2px); border-color: var(--purple); }
  .metric-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--purple), var(--pink));
  }
  .metric-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: .05em; }
  .metric-value { font-size: 32px; font-weight: 700; line-height: 1; }
  .metric-value.purple { color: var(--purple-light); }
  .metric-value.pink   { color: var(--pink); }
  .metric-value.cyan   { color: var(--cyan); }
  .metric-value.gold   { color: var(--gold); }
  .metric-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }

  /* 图表区 */
  .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media(max-width: 768px) { .charts { grid-template-columns: 1fr; } }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .chart-title { font-size: 14px; font-weight: 500; margin-bottom: 16px; color: var(--muted); }
  .chart-title strong { color: var(--text); }
  .chart-wrap { position: relative; }

  /* 底部两栏 */
  .bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 768px) { .bottom { grid-template-columns: 1fr; } }

  .list-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    max-height: 380px; overflow-y: auto;
  }
  .list-card::-webkit-scrollbar { width: 4px; }
  .list-card::-webkit-scrollbar-track { background: var(--surface2); }
  .list-card::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .list-item {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    font-size: 13px; line-height: 1.5;
  }
  .list-item:last-child { border-bottom: none; }
  .list-num { min-width: 20px; color: var(--purple-light); font-weight: 600; font-size: 12px; }
  .list-text { color: var(--text); }

  /* 加载中 */
  .loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: 14px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--purple); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Threads 数据来源标签 */
  .badge {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 20px; background: rgba(139,92,246,.15);
    border: 1px solid rgba(139,92,246,.3); color: var(--purple-light);
    margin-left: 8px; vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="title">🔮 <span>Zen Tarot · 运营看板</span></div>
    <div class="updated"><span class="dot"></span><span id="updated-time">加载中...</span></div>
  </header>

  <div id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      正在读取最新数据...
    </div>
  </div>
</div>

<script>
// GitHub Pages 上 data.json 的路径（和 dashboard.html 同目录）
const DATA_URL = './data.json?t=' + Date.now();

async function loadData() {
  try {
    const resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error('数据文件未找到，请先运行一次 GitHub Actions');
    const data = await resp.json();
    render(data);
  } catch (e) {
    document.getElementById('main-content').innerHTML =
      `<div class="loading" style="color:#f87171">⚠️ ${e.message}</div>`;
  }
}

function fmt(v) {
  if (!v || v === 'N/A') return 'N/A';
  const n = parseInt(String(v).replace(/,/g, ''));
  if (isNaN(n)) return v;
  return n.toLocaleString('zh-CN');
}

function render(data) {
  const t = data.threads || {};
  const s = data.supabase || {};
  const history = data.history || [];

  document.getElementById('updated-time').textContent = '最后更新：' + (data.updated_at || '未知');

  // ── 核心指标 ──────────────────────────────────
  const metricsHtml = `
    <div class="metrics">
      <div class="metric-card">
        <div class="metric-label">❤️ 点赞</div>
        <div class="metric-value pink">${fmt(t.likes)}</div>
        <div class="metric-sub">Threads 帖子</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">🔁 转发</div>
        <div class="metric-value purple">${fmt(t.reposts)}</div>
        <div class="metric-sub">Threads 帖子</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">💬 回复数</div>
        <div class="metric-value cyan">${fmt(t.replies)}</div>
        <div class="metric-sub">Threads 帖子</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">🌅 今日翻牌</div>
        <div class="metric-value gold">${fmt(s.today_flips)}</div>
        <div class="metric-sub">北京时间今日</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">📊 累计翻牌</div>
        <div class="metric-value purple">${fmt(s.total_flips)}</div>
        <div class="metric-sub">全部历史</div>
      </div>
    </div>`;

  // ── 图表区 ────────────────────────────────────
  const chartsHtml = `
    <div class="charts">
      <div class="chart-card">
        <div class="chart-title"><strong>📈 翻牌趋势</strong>（近 7 天每小时）</div>
        <div class="chart-wrap"><canvas id="trendChart" height="200"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title"><strong>🎴 占卜模式分布</strong>（今日）</div>
        <div class="chart-wrap"><canvas id="spreadChart" height="200"></canvas></div>
      </div>
    </div>`;

  // ── 今日时段分布 ──────────────────────────────
  const hourlyHtml = `
    <div class="chart-card" style="margin-bottom:24px">
      <div class="chart-title"><strong>⏰ 今日逐小时翻牌分布</strong>（北京时间）</div>
      <div class="chart-wrap"><canvas id="hourlyChart" height="120"></canvas></div>
    </div>`;

  // ── 评论 & 问题列表 ───────────────────────────
  const comments = t.comments || [];
  const questions = s.today_questions || [];
  const commentsHtml = comments.map((c, i) =>
    `<div class="list-item"><span class="list-num">${i+1}</span><span class="list-text">${escHtml(c)}</span></div>`
  ).join('') || '<div class="list-item"><span class="list-text" style="color:var(--muted)">暂无回复数据</span></div>';

  const questionsHtml = questions.slice(0, 100).map((q, i) =>
    `<div class="list-item"><span class="list-num">${i+1}</span><span class="list-text">${escHtml(q)}</span></div>`
  ).join('') || '<div class="list-item"><span class="list-text" style="color:var(--muted)">今日暂无问题</span></div>';

  const bottomHtml = `
    <div class="bottom">
      <div class="list-card">
        <div class="chart-title"><strong>💬 最新回复内容</strong><span class="badge">时间倒序</span></div>
        ${commentsHtml}
      </div>
      <div class="list-card">
        <div class="chart-title"><strong>❓ 今日用户提问</strong><span class="badge">去重 ${questions.length} 条</span></div>
        ${questionsHtml}
      </div>
    </div>`;

  document.getElementById('main-content').innerHTML =
    metricsHtml + chartsHtml + hourlyHtml + bottomHtml;

  // ── 渲染图表 ──────────────────────────────────
  const chartDefaults = {
    color: '#7c7a8e',
    borderColor: 'rgba(255,255,255,.05)',
  };
  Chart.defaults.color = chartDefaults.color;

  // 趋势折线图（历史快照）
  if (history.length > 0) {
    const labels = history.map(h => h.time.slice(5, 16));
    const flipsData = history.map(h => h.today_flips || 0);
    const likesData = history.map(h => parseInt(String(h.likes || '0').replace(/,/g,'')) || 0);

    new Chart(document.getElementById('trendChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '今日翻牌',
            data: flipsData,
            borderColor: '#a78bfa',
            backgroundColor: 'rgba(167,139,250,.1)',
            fill: true,
            tension: .4,
            pointRadius: 2,
          },
          {
            label: '点赞数',
            data: likesData,
            borderColor: '#ec4899',
            backgroundColor: 'rgba(236,72,153,.05)',
            fill: false,
            tension: .4,
            pointRadius: 2,
            yAxisID: 'y1',
          }
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { labels: { font: { size: 12 } } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { maxTicksLimit: 12, font: { size: 10 } } },
          y: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { font: { size: 10 } } },
          y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { font: { size: 10 } } },
        }
      }
    });
  }

  // 占卜模式饼图
  const spreadDist = s.spread_dist || {};
  const spreadKeys = Object.keys(spreadDist);
  if (spreadKeys.length > 0) {
    new Chart(document.getElementById('spreadChart'), {
      type: 'doughnut',
      data: {
        labels: spreadKeys,
        datasets: [{
          data: spreadKeys.map(k => spreadDist[k]),
          backgroundColor: ['#8b5cf6','#ec4899','#06b6d4','#f59e0b','#22c55e'],
          borderWidth: 0,
          hoverOffset: 6,
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 12 } }
        },
        cutout: '60%',
      }
    });
  } else {
    document.getElementById('spreadChart').parentElement.innerHTML =
      '<div style="color:var(--muted);text-align:center;padding:40px 0;font-size:13px">今日暂无数据</div>';
  }

  // 今日逐小时柱状图
  const hourlyData = s.hourly_flips || new Array(24).fill(0);
  new Chart(document.getElementById('hourlyChart'), {
    type: 'bar',
    data: {
      labels: Array.from({length:24}, (_,i) => `${i}时`),
      datasets: [{
        label: '翻牌次数',
        data: hourlyData,
        backgroundColor: hourlyData.map((v, i) => {
          const max = Math.max(...hourlyData, 1);
          const alpha = 0.3 + 0.7 * (v / max);
          return `rgba(139,92,246,${alpha})`;
        }),
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { font: { size: 10 }, stepSize: 1 } },
      }
    }
  });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

loadData();
// 每5分钟自动刷新
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
