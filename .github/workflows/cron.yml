name: 🔮 Zen Tarot 看板自动更新

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install deps (Ubuntu 24.04 fix)
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          sudo apt-get update
          sudo apt-get install -y libgbm1 libasound2t64 libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 libcairo2 libcups2 libdbus-1-3 libdrm2 libpango-1.0-0 libpangocairo-1.0-0 libx11-6 libx11-xcb1 libxcb1 libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 libxi6 libxrandr2 libxrender1 libxss1 libxtst6

      - name: 🚀 Run Monitor
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python monitor.py

      - name: 💾 Push to GitHub  # 🌟 这里是保存数据的关键
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git commit -m "Auto-update data [skip ci]" || exit 0
          git push
