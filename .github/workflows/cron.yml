name: 🔮 Zen Tarot · 运营监控看板

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    name: 运行监控脚本
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Ubuntu 24.04 Noble 将 libasound2 改名为 libasound2t64
      # playwright install-deps / --with-deps / --no-deps 均有兼容问题
      # 解决方案：手动装全依赖 + 直接调用 python -m playwright install chromium
      - name: 🔧 Install Chromium system dependencies (Noble-compatible)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2t64 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            ca-certificates \
            fonts-liberation \
            xvfb \
            --no-install-recommends
          # 创建 libasound.so.2 软链供 Chromium 运行时查找
          LIBASOUND=$(find /usr/lib/x86_64-linux-gnu -name 'libasound.so*' 2>/dev/null | head -1)
          if [ -n "$LIBASOUND" ] && [ ! -e /usr/lib/x86_64-linux-gnu/libasound.so.2 ]; then
            sudo ln -sf "$LIBASOUND" /usr/lib/x86_64-linux-gnu/libasound.so.2
            echo "Symlink: $LIBASOUND -> libasound.so.2"
          fi
          sudo ldconfig

      # 用 python -m playwright install chromium 只下载浏览器二进制，不触发 apt
      - name: 🌐 Download Playwright Chromium binary only
        run: python -m playwright install chromium

      - name: 🚀 Run monitor script
        run: python monitor.py

      - name: 📋 Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-failure-log-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
