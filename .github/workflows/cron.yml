name: 🔮 Zen Tarot Feishu Bot

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests supabase
      - env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python monitor.py
