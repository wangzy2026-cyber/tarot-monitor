name: 🔮 Zen Tarot · 运营监控看板

on:
  schedule:
    # 每小时整点触发（UTC），即北京时间每小时 +8
    - cron: '0 * * * *'
  workflow_dispatch:   # 支持手动触发，方便调试

jobs:
  monitor:
    name: 运行监控脚本
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # 从 GitHub Secrets 读取敏感配置（推荐）
      # 若未配置 Secret，脚本内已有硬编码 fallback
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      # ── 1. 检出代码 ────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── 2. 配置 Python 环境 ────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 安装 Python 依赖 ────────────────────────
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. 修复 Ubuntu 24.04 (Noble) libasound2 兼容问题 ──
      - name: 🔧 Fix libasound2 for Ubuntu Noble
        run: |
          sudo apt-get update -qq
          # Noble 上 libasound2 已改名为 libasound2t64，手动建立软链兼容
          sudo apt-get install -y libasound2t64 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libgbm1 libgtk-3-0 libnspr4 libnss3 \
            libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libxss1 \
            libxtst6 xvfb --no-install-recommends 2>/dev/null || true
          # 若系统没有 libasound2 符号包，手动创建软链让 Playwright 找到
          if ! ldconfig -p | grep -q 'libasound.so.2'; then
            ASOUND_LIB=$(ldconfig -p | grep 'libasound' | awk '{print $NF}' | head -1)
            if [ -n "$ASOUND_LIB" ]; then
              sudo ln -sf "$ASOUND_LIB" /usr/lib/x86_64-linux-gnu/libasound.so.2 2>/dev/null || true
            fi
          fi

      # ── 5. 安装 Playwright 浏览器（Chromium）──────
      - name: 🌐 Install Playwright Chromium
        run: |
          # 使用 --with-deps 让 playwright 自行处理依赖，跳过有问题的 install-deps
          playwright install --with-deps chromium

      # ── 5. 执行监控脚本 ────────────────────────────
      - name: 🚀 Run monitor script
        run: python monitor.py

      # ── 6. 上传日志（可选，失败时保留 7 天）────────
      - name: 📋 Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-failure-log-${{ github.run_id }}
          path: |
            *.log
          retention-days: 7
