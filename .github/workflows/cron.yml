name: 🔮 Zen Tarot · 运营监控看板

on:
  schedule:
    # 每小时整点触发（UTC），即北京时间每小时 +8
    - cron: '0 * * * *'
  workflow_dispatch:   # 支持手动触发，方便调试

jobs:
  monitor:
    name: 运行监控脚本
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      # ── 1. 检出代码 ────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── 2. 配置 Python 环境 ────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 安装 Python 依赖 ────────────────────────
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. 手动安装 Chromium 全部系统依赖 ──────────
      # Ubuntu 24.04 (Noble) 将 libasound2 改名为 libasound2t64
      # playwright --with-deps 和 install-deps 均会 apt install libasound2 导致 exit 100
      # 解决方案：用 --no-deps 完全跳过 playwright 的依赖安装，自己精确装好
      - name: 🔧 Install Chromium system dependencies (Noble-compatible)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2t64 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcairo2 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libglib2.0-0 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libx11-6 \
            libx11-xcb1 \
            libxcb1 \
            libxcomposite1 \
            libxcursor1 \
            libxdamage1 \
            libxext6 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxrender1 \
            libxss1 \
            libxtst6 \
            ca-certificates \
            fonts-liberation \
            xvfb \
            --no-install-recommends
          # 为 Playwright 创建 libasound.so.2 软链（libasound2t64 提供实际 .so 文件）
          LIBASOUND=$(find /usr/lib/x86_64-linux-gnu -name 'libasound.so*' 2>/dev/null | head -1)
          if [ -n "$LIBASOUND" ] && [ ! -f /usr/lib/x86_64-linux-gnu/libasound.so.2 ]; then
            sudo ln -sf "$LIBASOUND" /usr/lib/x86_64-linux-gnu/libasound.so.2
            echo "Symlink: $LIBASOUND -> libasound.so.2"
          fi
          sudo ldconfig

      # ── 5. 安装 Playwright Chromium（跳过 apt 依赖）──
      - name: 🌐 Install Playwright Chromium (--no-deps)
        run: playwright install --no-deps chromium

      # ── 6. 执行监控脚本 ────────────────────────────
      - name: 🚀 Run monitor script
        run: python monitor.py

      # ── 7. 上传日志（失败时保留 7 天）──────────────
      - name: 📋 Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-failure-log-${{ github.run_id }}
          path: "*.log"
          retention-days: 7
