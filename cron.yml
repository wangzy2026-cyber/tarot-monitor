name: 🔮 Zen Tarot · 运营监控看板

on:
  schedule:
    # 每小时整点触发（UTC），即北京时间每小时 +8
    - cron: '0 * * * *'
  workflow_dispatch:   # 支持手动触发，方便调试

jobs:
  monitor:
    name: 运行监控脚本
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # 从 GitHub Secrets 读取敏感配置（推荐）
      # 若未配置 Secret，脚本内已有硬编码 fallback
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

    steps:
      # ── 1. 检出代码 ────────────────────────────────
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      # ── 2. 配置 Python 环境 ────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. 安装 Python 依赖 ────────────────────────
      - name: 📦 Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. 安装 Playwright 浏览器（Chromium）──────
      - name: 🌐 Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      # ── 5. 执行监控脚本 ────────────────────────────
      - name: 🚀 Run monitor script
        run: python monitor.py

      # ── 6. 上传日志（可选，失败时保留 7 天）────────
      - name: 📋 Upload run log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-failure-log-${{ github.run_id }}
          path: |
            *.log
          retention-days: 7
